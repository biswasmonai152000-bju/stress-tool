        "Document Type": "Static Justification Report",
        "Structure/Location": "Dent Justification",
        "A/C": "",
        "S/C": "",
        "A/C Model": "",
        "Configuration": "",
        "Hyperlink": "file://in0-india-sfs.as.airbus.corp/AIRFRAME_CUSTOMER_SERVICE/02_Operations/RFE/Updated _Folder/1. Scope/1. RF/5. Common Documents/Static justification method for dents in stiffened panels - L53RP0722986_V5.0.pdf"
    }
            ];

            // Define the specific columns to be used as filters
            // IMPORTANT: These must EXACTLY match the keys in your rawData objects.
            const filterColumns = ["Document Type", "Structure/Location", "A/C", "S/C", "A/C Model", "Configuration"]; 
            // Define the columns to be displayed in the results
            const resultFileNameColumn = "Files"; 
            const resultHyperlinkColumn = "Hyperlink"; 

            /**
             * Populates a specific dropdown with unique values based on current filters.
             * @param {string} columnToPopulate - The name of the column for which to populate the dropdown.
             * @param {number} columnIndex - The index of the column in the filterColumns array.
             */
            const populateDropdown = (columnToPopulate, columnIndex) => {
                const selectElementId = `filter-${columnToPopulate.replace(/\s|\//g, '')}`; 
                const selectElement = document.getElementById(selectElementId);
                
                if (!selectElement) {
                    console.warn(`Dropdown element with ID '${selectElementId}' not found.`);
                    return;
                }

                // Store the currently selected value before clearing options
                const currentValue = selectElement.value;

                // Clear existing options, keeping the default "Select All"
                selectElement.innerHTML = '<option value="">-- Select All --</option>';
                
                // Determine the data to filter from based on preceding selections
                let filteredDataForDropdown = rawData.filter(row => {
                    for (let i = 0; i < columnIndex; i++) { // Check only preceding filters
                        const prevColName = filterColumns[i];
                        const prevSelectId = `filter-${prevColName.replace(/\s|\//g, '')}`;
                        const prevSelectElement = document.getElementById(prevSelectId);
                        
                        if (prevSelectElement && prevSelectElement.value && String(row[prevColName]) !== prevSelectElement.value) {
                            return false; // Exclude row if it doesn't match a preceding filter
                        }
                    }
                    return true;
                });

                // Extract unique values from the filtered data for the current column
                const uniqueValues = [...new Set(filteredDataForDropdown.map(row => row[columnToPopulate]).filter(val => val !== undefined && val !== null && String(val).trim() !== ''))].sort();
                
                uniqueValues.forEach(value => {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = value;
                    selectElement.appendChild(option);
                });

                // Restore the previously selected value if it's still an available option
                if (uniqueValues.includes(currentValue)) {
                    selectElement.value = currentValue;
                } else {
                    selectElement.value = ""; // Reset to "Select All" if not available
                }
            };

            /**
             * Initializes all dropdowns and sets up event listeners for interdependence.
             */
            const initializeFilters = () => {
                filterColumns.forEach((col, index) => {
                    // Create the dropdown HTML element
                    const selectElementId = `filter-${col.replace(/\s|\//g, '')}`; 
                    const div = document.createElement('div');
                    div.className = 'flex flex-col';
                    div.innerHTML = `
                        <label for="${selectElementId}" class="block text-sm font-medium text-gray-700">${col}</label>
                        <select id="${selectElementId}" data-column="${col}" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm bg-white">
                            <option value="">-- Select All --</option>
                        </select>
                    `;
                    filterDropdownsContainer.appendChild(div);

                    // Add change listener to each dropdown
                    const selectElement = document.getElementById(selectElementId);
                    selectElement.addEventListener('change', () => {
                        // When this dropdown changes, re-populate all subsequent dropdowns
                        for (let i = index + 1; i < filterColumns.length; i++) {
                            populateDropdown(filterColumns[i], i);
                        }
                        // Also re-populate this dropdown itself to ensure it only shows valid options
                        // based on preceding filters if any (though not strictly necessary after a direct selection)
                        populateDropdown(col, index); 
                    });
                });

                // Initial population of all dropdowns
                filterColumns.forEach((col, index) => populateDropdown(col, index));
            };

            // Call the function to initialize and populate dropdowns as soon as the page loads
            initializeFilters();


            filterButton.addEventListener('click', () => {
                const selectedFilters = {};
                // Collect selected values from all filter dropdowns
                filterColumns.forEach(col => {
                    const selectElementId = `filter-${col.replace(/\s|\//g, '')}`;
                    const selectElement = document.getElementById(selectElementId);
                    
                    // If a value is selected (not the default "Select All" empty string)
                    if (selectElement && selectElement.value) {
                        selectedFilters[col] = selectElement.value;
                    }
                });

                let filteredData = rawData.filter(row => {
                    // Check if the row matches all selected filter criteria
                    for (const column in selectedFilters) {
                        const filterValue = selectedFilters[column];
                        // Ensure the row has the column and its value matches the filter
                        if (String(row[column]) !== filterValue) {
                            return false;
                        }
                    }
                    return true;
                });

                resultsContainer.innerHTML = ''; // Clear previous results
                let resultsFound = false;

                if (filteredData.length > 0) {
                    filteredData.forEach(row => {
                        const fileName = row[resultFileNameColumn];
                        const hyperlink = row[resultHyperlinkColumn];

                        // Only display if both file name and hyperlink exist
                        if (fileName !== undefined && fileName !== null && String(fileName).trim() !== '' &&
                            hyperlink !== undefined && hyperlink !== null && String(hyperlink).trim() !== '') { 
                            
                            resultsFound = true;
                            const resultItem = document.createElement('div');
                            resultItem.className = 'p-3 bg-white rounded-md shadow-sm border border-gray-100 mb-2 text-gray-800 break-words';
                            
                            // Create clickable File Name
                            const fileLink = document.createElement('a');
                            fileLink.className = 'font-semibold text-indigo-700 hover:underline block mb-1';
                            fileLink.href = hyperlink; // Use the hyperlink for the file name itself
                            fileLink.textContent = fileName;
                            fileLink.target = "_blank"; // Open in new tab
                            resultItem.appendChild(fileLink);

                            // Display the full hyperlink below the file name (as text, not clickable again)
                            const hyperlinkTextDiv = document.createElement('div');
                            hyperlinkTextDiv.className = 'text-sm text-gray-600';
                            hyperlinkTextDiv.textContent = `Path: ${hyperlink}`;
                            resultItem.appendChild(hyperlinkTextDiv);

                            resultsContainer.appendChild(resultItem);
                        }
                    });
                } 
                
                if (!resultsFound) {
                    resultsContainer.innerHTML = '<p class="text-gray-500 italic">No results found matching your criteria.</p>';
                }
            });
        });
        
        // Initializes Lucide icons after the DOM is ready for display
        document.addEventListener('DOMContentLoaded', () => {
          lucide.createIcons();
        });
